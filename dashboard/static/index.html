<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Momentum</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; }
.header { padding: 12px 16px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 17px; font-weight: 700; }
.meta { color: #8b949e; font-size: 11px; }
.tabs { display: flex; border-bottom: 1px solid #21262d; overflow-x: auto; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 10px 14px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-size: 13px; white-space: nowrap; flex-shrink: 0; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.content { padding: 14px 16px; max-width: 1400px; margin: 0 auto; }
.panel { display: none; } .panel.active { display: block; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 14px; }
.stat-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 10px 12px; }
.stat-card .lbl { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
.stat-card .val { font-size: 18px; font-weight: 700; }
.filter-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 5px 10px; border-radius: 20px; border: 1px solid #30363d; background: #161b22; color: #8b949e; cursor: pointer; font-size: 12px; white-space: nowrap; }
.filter-btn.active { background: #1c3a4a; color: #58a6ff; border-color: #58a6ff; }
.search-box { padding: 5px 10px; border-radius: 20px; border: 1px solid #30363d; background: #161b22; color: #e6edf3; font-size: 12px; width: 140px; outline: none; }
.card-list { display: flex; flex-direction: column; gap: 8px; }
.stock-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 12px 14px; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-code { font-size: 12px; font-weight: 700; color: #58a6ff; flex-shrink: 0; }
.card-name { font-size: 15px; font-weight: 600; flex: 1; margin-left: 8px; }
.card-score { font-size: 22px; font-weight: 800; flex-shrink: 0; margin-left: 10px; }
.card-sector { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
.card-metrics { display: flex; gap: 12px; flex-wrap: wrap; }
.card-metric .mk { font-size: 10px; color: #8b949e; }
.card-metric .mv { font-size: 13px; font-weight: 600; }
.card-badges { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; background: #161b22; color: #8b949e; font-weight: 500; border-bottom: 1px solid #21262d; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: #e6edf3; }
td { padding: 7px 10px; border-bottom: 1px solid #161b22; white-space: nowrap; }
tr:hover td { background: #161b22; }
.pos { color: #3fb950; } .neg { color: #f85149; } .dim { color: #8b949e; }
.score-hi { color: #3fb950; font-weight: 700; } .score-md { color: #d29922; font-weight: 700; } .score-lo { color: #8b949e; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.b-buy { background: #1c3a4a; color: #58a6ff; } .b-sell { background: #2d1619; color: #f85149; }
.b-watch { background: #2d2111; color: #d29922; } .b-hold { background: #1c3227; color: #3fb950; }
.b-new { background: #2d1e4a; color: #bc8cff; }
.vol-bar-wrap { display: inline-flex; gap: 2px; align-items: center; }
.vb { width: 7px; height: 12px; border-radius: 2px; background: #21262d; } .vb.on { background: #3fb950; }
.chart-wrap { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 14px; margin-top: 14px; }
.chart-wrap h3 { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
.empty-state { color: #8b949e; text-align: center; padding: 48px 0; }
select { background: #21262d; color: #e6edf3; border: 1px solid #30363d; padding: 5px 10px; border-radius: 8px; font-size: 13px; }
.mobile-only { display: flex; flex-direction: column; gap: 8px; }
.desktop-only { display: none; }
@media (min-width: 768px) {
  .mobile-only { display: none !important; }
  .desktop-only { display: block; }
  .content { padding: 20px 24px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>🐼 Japan Momentum</h1>
  <span class="meta" id="last-updated">読み込み中...</span>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('signals')">🔔 シグナル</div>
  <div class="tab" onclick="showTab('ranking')">📊 ランキング</div>
  <div class="tab" onclick="showTab('backtest')">📈 バックテスト</div>
  <div class="tab" onclick="showTab('history')">📅 履歴</div>
</div>
<div class="content">

<div id="panel-signals" class="panel active">
  <div id="signals-loading" class="empty-state">データ取得中...</div>
  <div id="signals-wrap" style="display:none">
    <div class="stats-grid" id="sig-stats"></div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterSig('ALL',this)">全て<span id="cnt-all"></span></button>
      <button class="filter-btn" onclick="filterSig('BUY',this)">🚀急伸<span id="cnt-buy"></span></button>
      <button class="filter-btn" onclick="filterSig('NEW',this)">⭐新規<span id="cnt-new"></span></button>
      <button class="filter-btn" onclick="filterSig('TOP20',this)">Top20<span id="cnt-top20"></span></button>
      <button class="filter-btn" onclick="filterSig('SELL',this)">🔴急落<span id="cnt-sell"></span></button>
      <button class="filter-btn" onclick="filterSig('WATCH',this)">🟡注意<span id="cnt-watch"></span></button>
      <input class="search-box" id="sig-search" placeholder="🔍 銘柄名/コード" oninput="filterSig(curFilter)">
    </div>
    <div class="mobile-only" id="signals-cards"></div>
    <div class="desktop-only table-wrap">
      <table><thead><tr>
        <th onclick="sortSig(0)">順位</th><th onclick="sortSig(1)">銘柄</th><th>銘柄名</th>
        <th onclick="sortSig(2)">セクター</th><th onclick="sortSig(3)">スコア↓</th>
        <th onclick="sortSig(4)">前日比</th><th onclick="sortSig(5)">中期リターン</th>
        <th onclick="sortSig(6)">出来高</th><th onclick="sortSig(7)">陽線率</th>
        <th onclick="sortSig(8)">RS</th><th>シグナル</th><th>現在値</th>
      </tr></thead><tbody id="signals-body"></tbody></table>
    </div>
  </div>
</div>

<div id="panel-ranking" class="panel">
  <div id="ranking-loading" class="empty-state">データ取得中...</div>
  <div id="ranking-wrap" style="display:none">
    <div class="mobile-only" id="ranking-cards"></div>
    <div class="desktop-only table-wrap">
      <table><thead><tr>
        <th onclick="sortRank(0)">#</th><th onclick="sortRank(1)">銘柄</th><th>銘柄名</th>
        <th onclick="sortRank(2)">セクター</th><th onclick="sortRank(3)">スコア↓</th>
        <th onclick="sortRank(4)">RS</th><th onclick="sortRank(5)">中期リターン</th>
        <th onclick="sortRank(6)">出来高</th><th onclick="sortRank(7)">陽線率</th>
        <th onclick="sortRank(8)">RS加速</th><th>現在値</th>
      </tr></thead><tbody id="ranking-body"></tbody></table>
    </div>
  </div>
</div>

<div id="panel-backtest" class="panel">
  <div id="bt-loading" class="empty-state">データ取得中...</div>
  <div id="bt-wrap" style="display:none">
    <div class="stats-grid" id="bt-stats"></div>
    <div class="chart-wrap"><h3>累積リターン比較</h3><canvas id="equity-chart" height="80"></canvas></div>
    <div class="chart-wrap" style="margin-top:12px"><h3>直近の保有銘柄（週次）</h3><div id="holdings-table"></div></div>
  </div>
</div>

<div id="panel-history" class="panel">
  <div style="margin-bottom:12px">
    <select id="date-picker" onchange="loadHistoryDate(this.value)"><option>日付を選択...</option></select>
  </div>
  <div id="history-content"><div class="empty-state">日付を選択してください</div></div>
</div>

</div>
<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/attyunn127123456/japan-momentum/main';

function sc(s){ return s>=65?'score-hi':s>=50?'score-md':'score-lo'; }
function rc(v){ return v>=0?'pos':'neg'; }
function fR(v){ return '<span class="'+rc(v)+'">'+(v>0?'+':'')+v.toFixed(1)+'%</span>'; }
function fD(v){ return '<span class="'+rc(v)+'">'+(v>0?'+':'')+v.toFixed(0)+'</span>'; }
function vb(v){ const n=Math.round(v*3); return '<div class="vol-bar-wrap">'+[0,1,2].map(i=>'<div class="vb'+(i<n?' on':'')+'"></div>').join('')+'</div>'; }
function showTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  ['signals','ranking','backtest','history'].forEach((x,i)=>{
    if(x===n){ document.querySelectorAll('.tab')[i].classList.add('active'); document.getElementById('panel-'+x).classList.add('active'); }
  });
}
function badges(r){
  const t=[];
  if(r.rank_today<=20&&(r.rank_yesterday||999)>20) t.push('<span class="badge b-new">⭐New</span>');
  if(r.verdict==='BUY') t.push('<span class="badge b-buy">🚀急伸</span>');
  if(r.verdict==='SELL') t.push('<span class="badge b-sell">🔴急落</span>');
  if(r.verdict==='WATCH') t.push('<span class="badge b-watch">🟡注意</span>');
  return t.join(' ');
}

function makeCard(r, rank, isRank){
  const code = isRank ? (r.ticker||r.code||'').replace('.T','') : r.code;
  const score = isRank ? r.score : r.score_today;
  const ret = r.return_5_25d;
  const rs = r.rs_score;
  const rankStr = isRank ? '#'+(rank+1) : '#'+r.rank_today+(r.rank_yesterday&&r.rank_yesterday!==r.rank_today?' ←'+r.rank_yesterday:'');
  const b = isRank ? '' : badges(r);
  return '<div class="stock-card">'
    +'<div class="card-top"><div style="flex:1;min-width:0">'
    +'<div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">'
    +'<span style="font-size:11px;color:#8b949e">'+rankStr+'</span>'
    +'<span class="card-code">'+code+'</span>'
    +'<span style="font-size:15px;font-weight:600">'+(r.name||'')+'</span>'
    +'</div>'
    +'<div class="card-sector">'+(r.sector||'')+'</div>'
    +'</div>'
    +'<div class="card-score '+sc(score)+'">'+score.toFixed(0)+'</div>'
    +'</div>'
    +'<div class="card-metrics">'
    +'<div class="card-metric"><div class="mk">中期リターン</div><div class="mv '+rc(ret)+'">'+(ret>0?'+':'')+ret.toFixed(1)+'%</div></div>'
    +'<div class="card-metric"><div class="mk">RS</div><div class="mv '+rc(rs)+'">'+(rs>0?'+':'')+rs.toFixed(1)+'</div></div>'
    +'<div class="card-metric"><div class="mk">現在値</div><div class="mv">¥'+(r.price||0).toLocaleString()+'</div></div>'
    +(isRank?''
      :'<div class="card-metric"><div class="mk">前日比</div><div class="mv '+rc(r.score_delta)+'">'+(r.score_delta>0?'+':'')+r.score_delta.toFixed(0)+'</div></div>')
    +'</div>'
    +(b?'<div class="card-badges">'+b+'</div>':'')
    +'</div>';
}

// SIGNALS
let sigData=[], curFilter='ALL';
async function loadSignals(){
  let data;
  try { const r=await fetch('/api/signals'); if(r.ok) data=await r.json(); } catch(e){}
  if(!data){
    try { const r=await fetch(GITHUB_RAW+'/data/signal_history.json'); if(r.ok){ const h=await r.json(); data=h[h.length-1]; } } catch(e){}
  }
  if(!data){ document.getElementById('signals-loading').textContent='⚠️ daily_signal.py を実行してください'; return; }
  sigData=data.results||[];
  document.getElementById('last-updated').textContent=(data.date||'')+' ← '+(data.prev_date||'');
  const buy=sigData.filter(r=>r.verdict==='BUY').length;
  const sell=sigData.filter(r=>r.verdict==='SELL').length;
  const newT=sigData.filter(r=>r.rank_today<=20&&(r.rank_yesterday||999)>20).length;
  const drop=sigData.filter(r=>r.rank_today>20&&(r.rank_yesterday||0)<=20).length;
  document.getElementById('sig-stats').innerHTML=[
    {l:'対象銘柄',v:sigData.length,c:''},{l:'🚀急伸',v:buy,c:'pos'},
    {l:'🔴急落',v:sell,c:'neg'},{l:'⭐Top20新規',v:newT,c:'pos'},{l:'⬇️脱落',v:drop,c:'neg'},
  ].map(({l,v,c})=>'<div class="stat-card"><div class="lbl">'+l+'</div><div class="val '+c+'">'+v+'</div></div>').join('');
  document.getElementById('cnt-all').textContent=' '+sigData.length;
  document.getElementById('cnt-buy').textContent=' '+buy;
  document.getElementById('cnt-new').textContent=' '+newT;
  document.getElementById('cnt-sell').textContent=' '+sell;
  document.getElementById('cnt-watch').textContent=' '+sigData.filter(r=>r.verdict==='WATCH').length;
  document.getElementById('cnt-top20').textContent=' '+sigData.filter(r=>r.rank_today<=20).length;
  document.getElementById('signals-loading').style.display='none';
  document.getElementById('signals-wrap').style.display='block';
  renderSig(sigData);
}
function filterSig(f,btn){
  curFilter=f||curFilter;
  if(btn){ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  const q=document.getElementById('sig-search').value.trim().toLowerCase();
  let rows=sigData;
  if(curFilter==='BUY') rows=rows.filter(r=>r.verdict==='BUY');
  else if(curFilter==='SELL') rows=rows.filter(r=>r.verdict==='SELL');
  else if(curFilter==='WATCH') rows=rows.filter(r=>r.verdict==='WATCH');
  else if(curFilter==='NEW') rows=rows.filter(r=>r.rank_today<=20&&(r.rank_yesterday||999)>20);
  else if(curFilter==='TOP20') rows=rows.filter(r=>r.rank_today<=20);
  if(q) rows=rows.filter(r=>r.code.includes(q)||(r.name||'').includes(q)||(r.sector||'').includes(q));
  renderSig(rows);
}
function renderSig(rows){
  document.getElementById('signals-cards').innerHTML=rows.map((r,i)=>makeCard(r,i,false)).join('');
  document.getElementById('signals-body').innerHTML=rows.map(r=>'<tr>'
    +'<td class="dim">'+r.rank_today+(r.rank_yesterday&&r.rank_yesterday!==r.rank_today?'<span style="font-size:10px;color:#8b949e"> ←'+r.rank_yesterday+'</span>':'')+'</td>'
    +'<td><strong>'+r.code+'</strong></td><td>'+(r.name||'')+'</td>'
    +'<td class="dim">'+(r.sector||'').slice(0,8)+'</td>'
    +'<td><span class="'+sc(r.score_today)+'">'+r.score_today.toFixed(1)+'</span></td>'
    +'<td>'+fD(r.score_delta)+'</td><td>'+fR(r.return_5_25d)+'</td>'
    +'<td>'+vb(r.volume_acceleration)+'</td>'
    +'<td class="'+rc(r.green_day_ratio-0.5)+'">'+(r.green_day_ratio*100).toFixed(0)+'%</td>'
    +'<td class="'+rc(r.rs_score)+'">'+(r.rs_score>0?'+':'')+r.rs_score.toFixed(1)+'</td>'
    +'<td>'+badges(r)+'</td>'
    +'<td class="dim">¥'+(r.price||0).toLocaleString()+'</td>'
    +'</tr>').join('');
}
function sortSig(col){
  const keys=[null,'code','sector','score_today','score_delta','return_5_25d','volume_acceleration','green_day_ratio','rs_score'];
  const key=keys[col]; if(!key) return;
  sigData=[...sigData].sort((a,b)=>{const av=a[key],bv=b[key]; return typeof av==='string'?bv.localeCompare(av):bv-av;});
  renderSig(sigData);
}

// RANKING
let rankData=[];
async function loadRanking(){
  let data;
  try { const r=await fetch('/api/today'); if(r.ok) data=await r.json(); } catch(e){}
  if(!data){
    try { const r=await fetch(GITHUB_RAW+'/results/latest.json'); if(r.ok) data=await r.json(); } catch(e){}
  }
  if(!data){ document.getElementById('ranking-loading').textContent='⚠️ screener.py を実行してください'; return; }
  rankData=data.results||[];
  renderRank(rankData);
  document.getElementById('ranking-loading').style.display='none';
  document.getElementById('ranking-wrap').style.display='block';
}
function renderRank(rows){
  const top=rows.slice(0,50);
  document.getElementById('ranking-cards').innerHTML=top.map((r,i)=>makeCard(r,i,true)).join('');
  document.getElementById('ranking-body').innerHTML=top.map((r,i)=>'<tr>'
    +'<td class="dim">'+(i+1)+'</td>'
    +'<td><strong>'+(r.ticker||r.code||'').replace('.T','')+'</strong></td>'
    +'<td>'+(r.name||'')+'</td>'
    +'<td class="dim">'+(r.sector||'').slice(0,8)+'</td>'
    +'<td><span class="'+sc(r.score)+'">'+r.score.toFixed(1)+'</span></td>'
    +'<td class="'+rc(r.rs_score)+'">'+(r.rs_score>0?'+':'')+r.rs_score.toFixed(1)+'</td>'
    +'<td>'+fR(r.return_5_25d)+'</td>'
    +'<td>'+vb(r.volume_acceleration)+'</td>'
    +'<td class="'+rc(r.green_day_ratio-0.5)+'">'+(r.green_day_ratio*100).toFixed(0)+'%</td>'
    +'<td class="'+rc(r.rs_acceleration)+'">'+(r.rs_acceleration>0?'+':'')+r.rs_acceleration.toFixed(2)+'</td>'
    +'<td class="dim">¥'+(r.price||0).toLocaleString()+'</td>'
    +'</tr>').join('');
}
function sortRank(col){
  const keys=[null,'code','sector','score','rs_score','return_5_25d','volume_acceleration','green_day_ratio','rs_acceleration'];
  const key=keys[col]; if(!key||!rankData) return;
  const s=[...rankData].sort((a,b)=>{const av=a[key],bv=b[key]; return typeof av==='string'?bv.localeCompare(av):bv-av;});
  renderRank(s);
}

// BACKTEST
async function loadBacktest(){
  let data;
  try { const r=await fetch('/api/backtest'); if(r.ok) data=await r.json(); } catch(e){}
  if(!data){
    try { const r=await fetch(GITHUB_RAW+'/backtest/latest.json'); if(r.ok) data=await r.json(); } catch(e){}
  }
  if(!data){ document.getElementById('bt-loading').textContent='⚠️ backtest.py を実行してください'; return; }
  const s=data.summary;
  document.getElementById('bt-stats').innerHTML=[
    {l:'総リターン',v:s.total_return_pct,p:true},{l:'年率',v:s.annual_return_pct,p:true},
    {l:'日経225',v:s.nikkei_return_pct,p:true},{l:'アルファ',v:s.alpha_pct,p:true},
    {l:'保有数',v:s.top_n,p:false},{l:'リバランス',v:s.num_rebalances+'回',p:false},
  ].map(({l,v,p})=>'<div class="stat-card"><div class="lbl">'+l+'</div><div class="val '+(p?(v>=0?'pos':'neg'):'')+'">'+(p?(v>0?'+':'')+v+'%':v)+'</div></div>').join('');
  const eq=data.equity_curve||[];
  document.getElementById('bt-loading').style.display='none';
  document.getElementById('bt-wrap').style.display='block';
  new Chart(document.getElementById('equity-chart'),{type:'line',data:{labels:eq.map(e=>e.date),datasets:[{label:'日経225',data:eq.map(e=>e.nikkei),borderColor:'#8b949e',fill:false,pointRadius:0,tension:0.3}]},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e'}}},scales:{x:{ticks:{color:'#8b949e',maxTicksLimit:10},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}}}});
  const h=(data.weekly_holdings||[]).slice(-8).reverse();
  document.getElementById('holdings-table').innerHTML='<div class="table-wrap"><table><thead><tr><th>週</th><th>保有銘柄</th></tr></thead><tbody>'+h.map(r=>'<tr><td class="dim">'+r.date+'</td><td>'+r.tickers.map(t=>'<span class="badge b-hold">'+t.replace('.T','')+'</span>').join(' ')+'</td></tr>').join('')+'</tbody></table></div>';
}

// HISTORY
async function loadHistory(){
  let dates=[];
  try { const r=await fetch('/api/history'); if(r.ok) dates=await r.json(); } catch(e){}
  if(!dates.length){
    try { const r=await fetch(GITHUB_RAW+'/results/index.json'); if(r.ok) dates=await r.json(); } catch(e){}
  }
  const pk=document.getElementById('date-picker');
  dates.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent=d; pk.appendChild(o); });
}
async function loadHistoryDate(date){
  if(!date||date.includes('選択')) return;
  let data;
  try { const r=await fetch('/api/results/'+date); if(r.ok) data=await r.json(); } catch(e){}
  if(!data){
    try { const r=await fetch(GITHUB_RAW+'/results/'+date+'.json'); if(r.ok) data=await r.json(); } catch(e){}
  }
  if(!data) return;
  const rows=(data.results||data.top||[]).slice(0,20);
  const isMobile=window.innerWidth<768;
  if(isMobile){
    document.getElementById('history-content').innerHTML='<div class="card-list">'+rows.map((r,i)=>makeCard(r,i,true)).join('')+'</div>';
  } else {
    document.getElementById('history-content').innerHTML='<div class="table-wrap"><table><thead><tr><th>#</th><th>銘柄</th><th>銘柄名</th><th>セクター</th><th>スコア</th><th>中期リターン</th><th>陽線率</th></tr></thead><tbody>'+rows.map((r,i)=>'<tr><td class="dim">'+(i+1)+'</td><td><strong>'+(r.ticker||r.code||'').replace('.T','')+'</strong></td><td>'+(r.name||'')+'</td><td class="dim">'+(r.sector||'').slice(0,10)+'</td><td><span class="'+sc(r.score)+'">'+r.score.toFixed(1)+'</span></td><td>'+fR(r.return_5_25d)+'</td><td class="'+rc(r.green_day_ratio-0.5)+'">'+(r.green_day_ratio*100).toFixed(0)+'%</td></tr>').join('')+'</tbody></table></div>';
  }
}

loadSignals(); loadRanking(); loadBacktest(); loadHistory();
</script>
</body>
</html>

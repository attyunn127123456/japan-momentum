<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Alpha Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; min-height: 100vh; }
  
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; color: #f0f6fc; }
  header .badge { background: #238636; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  
  .tabs { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; display: flex; gap: 0; }
  .tab { padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent; color: #8b949e; font-size: 14px; transition: all 0.2s; }
  .tab:hover { color: #c9d1d9; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  
  .content { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }
  
  .updated { color: #8b949e; font-size: 12px; margin-bottom: 16px; }
  
  /* 仮説カード */
  .hypothesis-grid { display: grid; gap: 16px; }
  .hypothesis-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
  .hypothesis-card:hover { border-color: #58a6ff44; }
  .hyp-theme { font-size: 16px; font-weight: 600; color: #f0f6fc; margin-bottom: 8px; }
  .hyp-logic { color: #8b949e; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
  .hyp-meta { display: flex; gap: 16px; align-items: center; }
  .confidence-bar { flex: 1; background: #21262d; border-radius: 4px; height: 6px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #238636, #58a6ff); transition: width 0.5s; }
  .confidence-label { font-size: 12px; color: #8b949e; white-space: nowrap; }
  .hyp-conditions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .condition-tag { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 2px 8px; font-size: 12px; color: #8b949e; }
  
  /* 銘柄テーブル */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 500; font-size: 12px; text-transform: uppercase; }
  td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #161b22; }
  .code { font-family: monospace; color: #58a6ff; font-weight: 600; }
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-fill { height: 4px; border-radius: 2px; background: #238636; }
  .positive { color: #3fb950; }
  .negative { color: #f85149; }
  .neutral { color: #8b949e; }
  
  /* モメンタム */
  .momentum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .momentum-grid { grid-template-columns: 1fr; } }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
  .card h3 { font-size: 14px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; }
  .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 14px; }
  .stat:last-child { border-bottom: none; }
  .stat-label { color: #8b949e; }
  .stat-value { color: #f0f6fc; font-weight: 500; }
  
  .loading { text-align: center; padding: 60px; color: #8b949e; }
  .error { background: #3d1f1f; border: 1px solid #f8514944; border-radius: 8px; padding: 16px; color: #f85149; }
  
  .market-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .summary-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .summary-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .summary-value { font-size: 20px; font-weight: 600; color: #f0f6fc; }
</style>
</head>
<body>

<header>
  <h1>🐼 Japan Alpha Dashboard</h1>
  <span class="badge">LIVE</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('hypotheses')">📊 マクロ仮説</div>
  <div class="tab" onclick="showTab('candidates')">🎯 注目銘柄</div>
  <div class="tab" onclick="showTab('momentum')">⚡ モメンタム</div>
</div>

<div class="content">

  <!-- マクロ仮説タブ -->
  <div id="tab-hypotheses" class="section active">
    <div id="market-summary-area"></div>
    <div id="updated-hypotheses" class="updated"></div>
    <div id="hypothesis-list" class="hypothesis-grid">
      <div class="loading">仮説データ読み込み中...</div>
    </div>
  </div>

  <!-- 注目銘柄タブ -->
  <div id="tab-candidates" class="section">
    <div id="updated-candidates" class="updated"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>コード</th>
            <th>ROE</th>
            <th>営業利益率</th>
            <th>売上成長率</th>
            <th>来期成長予想</th>
            <th>スコア</th>
          </tr>
        </thead>
        <tbody id="candidates-tbody">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:#8b949e">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- モメンタムタブ -->
  <div id="tab-momentum" class="section">
    <div id="updated-momentum" class="updated"></div>
    <div id="momentum-content" class="loading">モメンタムデータ読み込み中...</div>
  </div>

</div>

<script>
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

function fmt(v, suffix='%', digits=1) {
  if (v == null || isNaN(v)) return '<span class="neutral">—</span>';
  const cls = v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral';
  return `<span class="${cls}">${v > 0 ? '+' : ''}${v.toFixed(digits)}${suffix}</span>`;
}

// マクロ仮説読み込み
async function loadHypotheses() {
  try {
    const r = await fetch('/api/hypotheses');
    const data = await r.json();
    
    if (data.updated_at) {
      document.getElementById('updated-hypotheses').textContent = `最終更新: ${data.updated_at}`;
    }
    
    // マーケットサマリー
    if (data.market_summary) {
      const ms = data.market_summary;
      document.getElementById('market-summary-area').innerHTML = `
        <div class="market-summary">
          <div class="summary-card"><div class="summary-label">対象企業数</div><div class="summary-value">${ms.total_companies?.toLocaleString() || '—'}</div></div>
          <div class="summary-card"><div class="summary-label">ROE中央値</div><div class="summary-value">${ms.median_roe?.toFixed(1) || '—'}%</div></div>
          <div class="summary-card"><div class="summary-label">営業利益率中央値</div><div class="summary-value">${ms.median_op_margin?.toFixed(1) || '—'}%</div></div>
          <div class="summary-card"><div class="summary-label">ROE>15%企業数</div><div class="summary-value">${ms.high_roe_count?.toLocaleString() || '—'}</div></div>
          <div class="summary-card"><div class="summary-label">来期増収予想企業数</div><div class="summary-value">${ms.high_growth_count?.toLocaleString() || '—'}</div></div>
        </div>`;
    }
    
    const hyps = data.hypotheses || [];
    if (!hyps.length) {
      document.getElementById('hypothesis-list').innerHTML = '<div class="error">仮説データがありません。macro_hypothesis_engine.pyを実行してください。</div>';
      return;
    }
    
    document.getElementById('hypothesis-list').innerHTML = hyps.map(h => `
      <div class="hypothesis-card">
        <div class="hyp-theme">${h.theme || '—'}</div>
        <div class="hyp-logic">${h.logic || '—'}</div>
        <div class="hyp-meta">
          <div class="confidence-bar"><div class="confidence-fill" style="width:${((h.confidence||0)*100).toFixed(0)}%"></div></div>
          <span class="confidence-label">確信度 ${((h.confidence||0)*100).toFixed(0)}%</span>
          <span class="confidence-label">${h.created_at || ''}</span>
        </div>
        ${h.target_conditions ? `
        <div class="hyp-conditions">
          ${h.target_conditions.min_roe ? `<span class="condition-tag">ROE≥${h.target_conditions.min_roe}%</span>` : ''}
          ${h.target_conditions.min_op_margin ? `<span class="condition-tag">営業利益率≥${h.target_conditions.min_op_margin}%</span>` : ''}
          ${h.target_conditions.sector_hint ? `<span class="condition-tag">${h.target_conditions.sector_hint}</span>` : ''}
        </div>` : ''}
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('hypothesis-list').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
  }
}

// 注目銘柄読み込み
async function loadCandidates() {
  try {
    const r = await fetch('/api/candidates');
    const data = await r.json();
    if (data.updated_at) {
      document.getElementById('updated-candidates').textContent = `最終更新: ${data.updated_at} | ${data.total || 0}件`;
    }
    const candidates = data.candidates || [];
    if (!candidates.length) {
      document.getElementById('candidates-tbody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#8b949e">データなし。fundamental_screener.pyを実行してください。</td></tr>';
      return;
    }
    document.getElementById('candidates-tbody').innerHTML = candidates.slice(0, 50).map(c => `
      <tr>
        <td><span class="code">${c.code}</span></td>
        <td>${fmt(c.roe)}</td>
        <td>${fmt(c.op_margin)}</td>
        <td>${fmt(c.sales_growth_yoy)}</td>
        <td>${fmt(c.forecast_sales_growth)}</td>
        <td>
          <div class="score-bar">
            <div class="score-fill" style="width:${(c.score*80).toFixed(0)}px"></div>
            <span>${(c.score*100).toFixed(0)}</span>
          </div>
        </td>
      </tr>
    `).join('');
  } catch(e) {
    document.getElementById('candidates-tbody').innerHTML = `<tr><td colspan="6">エラー: ${e.message}</td></tr>`;
  }
}

// モメンタム読み込み
async function loadMomentum() {
  try {
    const r = await fetch('/api/today');
    const data = await r.json();
    const best10 = data.best10 || [];
    if (!best10.length) {
      document.getElementById('momentum-content').innerHTML = '<div class="error">モメンタムデータなし</div>';
      return;
    }
    document.getElementById('updated-momentum').textContent = `シグナル: ${best10.length}件`;
    document.getElementById('momentum-content').innerHTML = `
      <div class="momentum-grid">
        ${best10.slice(0,10).map(s => `
          <div class="card">
            <h3>${s.code || '—'} ${s.name || ''}</h3>
            ${Object.entries(s).filter(([k]) => !['code','name'].includes(k)).slice(0,5).map(([k,v]) =>
              `<div class="stat"><span class="stat-label">${k}</span><span class="stat-value">${typeof v === 'number' ? v.toFixed(2) : v}</span></div>`
            ).join('')}
          </div>
        `).join('')}
      </div>`;
  } catch(e) {
    document.getElementById('momentum-content').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
  }
}

// 初期ロード
loadHypotheses();
loadCandidates();
loadMomentum();
</script>
</body>
</html>

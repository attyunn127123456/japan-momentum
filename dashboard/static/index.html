<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Momentum Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; }
.header { padding: 16px 24px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .meta { color: #8b949e; font-size: 13px; }
.tabs { display: flex; border-bottom: 1px solid #21262d; padding: 0 24px; }
.tab { padding: 12px 18px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-size: 13px; white-space: nowrap; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.content { padding: 20px 24px; }
.panel { display: none; }
.panel.active { display: block; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; background: #161b22; color: #8b949e; font-weight: 500; border-bottom: 1px solid #21262d; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: #e6edf3; }
td { padding: 8px 12px; border-bottom: 1px solid #161b22; white-space: nowrap; }
tr:hover td { background: #161b22; }

/* Colors */
.pos { color: #3fb950; }
.neg { color: #f85149; }
.dim { color: #8b949e; }
.score-hi { color: #3fb950; font-weight: 700; }
.score-md { color: #d29922; font-weight: 700; }
.score-lo { color: #8b949e; }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-sell { background: #2d1619; color: #f85149; }
.badge-watch { background: #2d2111; color: #d29922; }
.badge-hold { background: #1c3227; color: #3fb950; }

/* Cards */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 14px; }
.stat-card .label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
.stat-card .value { font-size: 22px; font-weight: 700; }

/* Chart */
.chart-wrap { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; margin-top: 16px; }
.chart-wrap h3 { font-size: 13px; color: #8b949e; margin-bottom: 12px; }

/* Signal cards */
.signal-group { margin-bottom: 20px; }
.signal-group-title { font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.signal-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 16px; }
.signal-card.sell { border-left: 3px solid #f85149; }
.signal-card.watch { border-left: 3px solid #d29922; }
.signal-card.hold { border-left: 3px solid #3fb950; }
.sig-main { flex: 1; }
.sig-code { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.sig-metrics { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
.sig-metric { font-size: 12px; color: #8b949e; }
.sig-metric span { font-weight: 600; }
.sig-reasons { display: flex; gap: 6px; flex-wrap: wrap; }
.sig-reason { font-size: 11px; background: #0d1117; padding: 2px 8px; border-radius: 4px; }
.sig-score { text-align: right; min-width: 60px; }
.sig-score .num { font-size: 24px; font-weight: 700; }
.sig-score .delta { font-size: 11px; }
.empty-state { color: #8b949e; text-align: center; padding: 40px 0; }

/* Vol bar */
.vol-bar-wrap { display: inline-flex; gap: 2px; align-items: center; }
.vol-bar-wrap .bar { width: 8px; height: 14px; border-radius: 2px; background: #21262d; }
.vol-bar-wrap .bar.on { background: #3fb950; }

/* Misc */
select { background: #21262d; color: #e6edf3; border: 1px solid #30363d; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
.row-actions { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="header">
  <h1>🐼 Japan Momentum</h1>
  <span class="meta" id="last-updated">読み込み中...</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('ranking')">📊 ランキング</div>
  <div class="tab" onclick="showTab('signals')">🔔 シグナル</div>
  <div class="tab" onclick="showTab('backtest')">📈 バックテスト</div>
  <div class="tab" onclick="showTab('history')">📅 履歴</div>
</div>

<div class="content">

<!-- ── RANKING ── -->
<div id="panel-ranking" class="panel active">
  <div id="ranking-loading" class="empty-state">データ取得中...</div>
  <div id="ranking-wrap" style="display:none">
    <table id="ranking-table">
      <thead><tr>
        <th onclick="sortTable(0)">#</th>
        <th onclick="sortTable(1)">銘柄</th>
        <th onclick="sortTable(2)">セクター</th>
        <th onclick="sortTable(3)">スコア ↓</th>
        <th onclick="sortTable(4)">RS</th>
        <th onclick="sortTable(5)">中期リターン</th>
        <th onclick="sortTable(6)">出来高</th>
        <th onclick="sortTable(7)">陽線率</th>
        <th onclick="sortTable(8)">RS加速</th>
        <th>現在値</th>
      </tr></thead>
      <tbody id="ranking-body"></tbody>
    </table>
  </div>
</div>

<!-- ── SIGNALS ── -->
<div id="panel-signals" class="panel">
  <div id="signals-loading" class="empty-state">シグナルデータ取得中...</div>
  <div id="signals-wrap" style="display:none">
    <div class="row-actions">
      <div id="signals-date" class="dim"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="dim" style="font-size:12px">保有銘柄: </span>
        <span id="portfolio-codes" class="dim" style="font-size:12px">-</span>
      </div>
    </div>

    <!-- SELL -->
    <div class="signal-group" id="sg-sell" style="display:none">
      <div class="signal-group-title">🔴 売り検討</div>
      <div id="sg-sell-cards"></div>
    </div>
    <!-- WATCH -->
    <div class="signal-group" id="sg-watch" style="display:none">
      <div class="signal-group-title">🟡 要注意</div>
      <div id="sg-watch-cards"></div>
    </div>
    <!-- HOLD -->
    <div class="signal-group" id="sg-hold" style="display:none">
      <div class="signal-group-title">✅ 継続保有</div>
      <div id="sg-hold-cards"></div>
    </div>

    <!-- スコア推移チャート -->
    <div class="chart-wrap" id="score-chart-wrap" style="display:none">
      <h3>スコア推移（過去30日）</h3>
      <canvas id="score-chart" height="70"></canvas>
    </div>

    <!-- 乗り換え候補 -->
    <div id="candidates-wrap" style="display:none;margin-top:20px">
      <div class="signal-group-title">💡 乗り換え候補（最新スクリーニング）</div>
      <table>
        <thead><tr><th>銘柄</th><th>セクター</th><th>スコア</th><th>中期リターン</th><th>出来高</th></tr></thead>
        <tbody id="candidates-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── BACKTEST ── -->
<div id="panel-backtest" class="panel">
  <div id="bt-loading" class="empty-state">バックテストデータ取得中...</div>
  <div id="bt-wrap" style="display:none">
    <div class="stats-grid" id="bt-stats"></div>
    <div class="chart-wrap">
      <h3>日経225 累積リターン</h3>
      <canvas id="equity-chart" height="80"></canvas>
    </div>
    <div class="chart-wrap" style="margin-top:12px">
      <h3>直近の保有銘柄（週次）</h3>
      <div id="holdings-table"></div>
    </div>
  </div>
</div>

<!-- ── HISTORY ── -->
<div id="panel-history" class="panel">
  <div style="margin-bottom:14px">
    <select id="date-picker" onchange="loadHistoryDate(this.value)">
      <option>日付を選択...</option>
    </select>
  </div>
  <div id="history-content"><div class="empty-state">日付を選択してください</div></div>
</div>

</div><!-- /content -->

<script>
// ── utils ──
function scoreClass(s) {
  return s >= 65 ? 'score-hi' : s >= 50 ? 'score-md' : 'score-lo';
}
function volBars(v) {
  const n = Math.round(v * 3);
  return `<div class="vol-bar-wrap">${[0,1,2].map(i=>`<div class="bar${i<n?' on':''}"></div>`).join('')}</div>`;
}
function retColor(v) { return v >= 0 ? 'pos' : 'neg'; }
function fmtRet(v) { return `<span class="${retColor(v)}">${v>0?'+':''}${v.toFixed(1)}%</span>`; }
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const names = ['ranking','signals','backtest','history'];
  document.querySelectorAll('.tab')[names.indexOf(name)].classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── RANKING ──
let rankingData = null, sortCol = 3, sortAsc = false;

async function loadRanking() {
  const res = await fetch('/api/today').catch(() => null);
  if (!res || !res.ok) {
    document.getElementById('ranking-loading').textContent = '❌ screener.py を先に実行してください';
    return;
  }
  const data = await res.json();
  rankingData = data.results || [];
  document.getElementById('last-updated').textContent = `更新: ${data.date}`;
  renderRanking(rankingData);
}

function renderRanking(rows) {
  document.getElementById('ranking-body').innerHTML = rows.slice(0,30).map((r,i) => `<tr>
    <td class="dim">${i+1}</td>
    <td><strong>${r.ticker?.replace('.T','') || r.code}</strong></td>
    <td class="dim">${(r.sector||'').slice(0,10)}</td>
    <td><span class="${scoreClass(r.score)}">${r.score.toFixed(1)}</span></td>
    <td>${fmtRet(r.rs_score)}</td>
    <td>${fmtRet(r.return_5_25d)}</td>
    <td>${volBars(r.volume_acceleration)}</td>
    <td class="${retColor(r.green_day_ratio - 0.5)}">${(r.green_day_ratio*100).toFixed(0)}%</td>
    <td class="${retColor(r.rs_acceleration)}">${r.rs_acceleration>0?'+':''}${r.rs_acceleration.toFixed(2)}</td>
    <td class="dim">¥${r.price?.toLocaleString()||'-'}</td>
  </tr>`).join('');
  document.getElementById('ranking-loading').style.display = 'none';
  document.getElementById('ranking-wrap').style.display = 'block';
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = false; }
  const keys = [null,'code','sector','score','rs_score','return_5_25d','volume_acceleration','green_day_ratio','rs_acceleration','price'];
  const key = keys[col]; if (!key || !rankingData) return;
  const sorted = [...rankingData].sort((a,b) => {
    const av=a[key], bv=b[key];
    if (typeof av==='string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortAsc ? av-bv : bv-av;
  });
  renderRanking(sorted);
}

// ── SIGNALS ──
let scoreHistoryData = null;

function buildSignalCard(r) {
  const v = r.verdict || 'HOLD';
  const cls = v === 'SELL' ? 'sell' : v === 'WATCH' ? 'watch' : 'hold';
  const delta = r.score_delta_1d || 0;
  const reasons = (r.signals || []).map(([e, t]) => `<span class="sig-reason">${e} ${t}</span>`).join('');
  return `<div class="signal-card ${cls}">
    <div class="sig-main">
      <div class="sig-code">${r.code}</div>
      <div class="sig-metrics">
        <div class="sig-metric">対日経3日: <span class="${retColor(r.rel_3d||0)}">${(r.rel_3d||0)>0?'+':''}${(r.rel_3d||0).toFixed(1)}%</span></div>
        <div class="sig-metric">対日経5日: <span class="${retColor(r.rel_5d||0)}">${(r.rel_5d||0)>0?'+':''}${(r.rel_5d||0).toFixed(1)}%</span></div>
        <div class="sig-metric">出来高: ${volBars(r.vol_acceleration||0)}</div>
        ${r.ma50_broken ? '<div class="sig-metric" style="color:#f85149">50日MA割れ</div>' : ''}
      </div>
      <div class="sig-reasons">${reasons}</div>
    </div>
    <div class="sig-score">
      <div class="num ${scoreClass(r.score_today||0)}">${(r.score_today||0).toFixed(0)}</div>
      <div class="delta ${retColor(delta)}">${delta>0?'+':''}${delta.toFixed(0)}d</div>
      <div class="dim" style="font-size:11px">¥${(r.price||0).toLocaleString()}</div>
    </div>
  </div>`;
}

async function loadSignals() {
  // ポートフォリオ
  const pRes = await fetch('/api/portfolio').catch(()=>null);
  if (pRes?.ok) {
    const p = await pRes.json();
    document.getElementById('portfolio-codes').textContent = (p.holdings||[]).join(', ') || '未登録';
  }

  const res = await fetch('/api/signals').catch(()=>null);
  if (!res || !res.ok) {
    document.getElementById('signals-loading').textContent = '❌ daily_signal.py を先に実行してください';
    return;
  }
  const data = await res.json();
  const results = data.results || [];
  document.getElementById('signals-date').textContent = data.date ? `最終チェック: ${data.date.slice(0,16)}` : '';

  const sells = results.filter(r => r.verdict === 'SELL');
  const watches = results.filter(r => r.verdict === 'WATCH');
  const holds = results.filter(r => r.verdict === 'HOLD');

  [['sell', sells], ['watch', watches], ['hold', holds]].forEach(([id, group]) => {
    const el = document.getElementById(`sg-${id}`);
    if (group.length > 0) {
      document.getElementById(`sg-${id}-cards`).innerHTML = group.map(buildSignalCard).join('');
      el.style.display = 'block';
    }
  });

  document.getElementById('signals-loading').style.display = 'none';
  document.getElementById('signals-wrap').style.display = 'block';

  // スコア推移チャート（履歴から）
  loadScoreChart(results.map(r => r.code));

  // 乗り換え候補
  loadCandidates(results.map(r => r.code));
}

async function loadScoreChart(holdingCodes) {
  const res = await fetch('/api/signals/history').catch(()=>null);
  if (!res?.ok) return;
  const history = await res.json();
  if (history.length < 2) return;

  const labels = history.map(h => h.date.slice(0,10));
  const datasets = holdingCodes.map((code, i) => {
    const colors = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#79c0ff'];
    const data = history.map(h => {
      const r = (h.results||[]).find(x => x.code === code);
      return r ? r.score_today : null;
    });
    return { label: code, data, borderColor: colors[i % colors.length], fill: false, pointRadius: 2, tension: 0.3, spanGaps: true };
  });

  document.getElementById('score-chart-wrap').style.display = 'block';
  new Chart(document.getElementById('score-chart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8b949e', maxTicksLimit: 10 }, grid: { color: '#21262d' } },
        y: { min: 0, max: 100, ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }
      }
    }
  });
}

async function loadCandidates(holdingCodes) {
  const res = await fetch('/api/today').catch(()=>null);
  if (!res?.ok) return;
  const data = await res.json();
  const top = (data.top || data.results || []).slice(0, 10);
  const candidates = top.filter(r => !holdingCodes.includes(r.code || r.ticker?.replace('.T',''))).slice(0,5);
  if (!candidates.length) return;

  document.getElementById('candidates-wrap').style.display = 'block';
  document.getElementById('candidates-body').innerHTML = candidates.map(r => `<tr>
    <td><strong>${r.code || r.ticker?.replace('.T','')}</strong></td>
    <td class="dim">${(r.sector||'').slice(0,10)}</td>
    <td><span class="${scoreClass(r.score)}">${r.score.toFixed(1)}</span></td>
    <td>${fmtRet(r.return_5_25d)}</td>
    <td>${volBars(r.volume_acceleration)}</td>
  </tr>`).join('');
}

// ── BACKTEST ──
async function loadBacktest() {
  const res = await fetch('/api/backtest').catch(()=>null);
  if (!res?.ok) {
    document.getElementById('bt-loading').textContent = '❌ backtest.py を先に実行してください';
    return;
  }
  const data = await res.json();
  const s = data.summary;
  document.getElementById('bt-stats').innerHTML = [
    {l:'総リターン', v:s.total_return_pct, pct:true},
    {l:'年率リターン', v:s.annual_return_pct, pct:true},
    {l:'日経225', v:s.nikkei_return_pct, pct:true},
    {l:'アルファ', v:s.alpha_pct, pct:true},
    {l:'保有銘柄数', v:s.top_n, pct:false},
    {l:'リバランス', v:s.num_rebalances+'回', pct:false},
  ].map(({l,v,pct}) => {
    const cls = pct ? (v>=0?'pos':'neg') : '';
    const disp = pct ? `${v>0?'+':''}${v}%` : v;
    return `<div class="stat-card"><div class="label">${l}</div><div class="value ${cls}">${disp}</div></div>`;
  }).join('');

  const eq = data.equity_curve || [];
  document.getElementById('bt-loading').style.display = 'none';
  document.getElementById('bt-wrap').style.display = 'block';

  new Chart(document.getElementById('equity-chart'), {
    type: 'line',
    data: {
      labels: eq.map(e=>e.date),
      datasets: [{ label:'日経225', data:eq.map(e=>e.nikkei), borderColor:'#8b949e', fill:false, pointRadius:0, tension:0.3 }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color:'#8b949e' } } },
      scales: {
        x: { ticks: { color:'#8b949e', maxTicksLimit:12 }, grid: { color:'#21262d' } },
        y: { ticks: { color:'#8b949e', callback: v=>'¥'+v.toLocaleString() }, grid: { color:'#21262d' } }
      }
    }
  });

  const holdings = (data.weekly_holdings||[]).slice(-8).reverse();
  document.getElementById('holdings-table').innerHTML = `<table>
    <thead><tr><th>週</th><th>保有銘柄</th></tr></thead>
    <tbody>${holdings.map(h=>`<tr>
      <td class="dim">${h.date}</td>
      <td>${h.tickers.map(t=>`<span class="badge badge-hold" style="margin:2px">${t.replace('.T','')} ${h.scores?.[t]?.toFixed(0)||''}</span>`).join(' ')}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ── HISTORY ──
async function loadHistory() {
  const res = await fetch('/api/history').catch(()=>null);
  if (!res) return;
  const dates = await res.json();
  const picker = document.getElementById('date-picker');
  dates.forEach(d => { const o = document.createElement('option'); o.value=d; o.textContent=d; picker.appendChild(o); });
}
async function loadHistoryDate(date) {
  if (!date || date.includes('選択')) return;
  const res = await fetch(`/api/results/${date}`).catch(()=>null);
  if (!res?.ok) return;
  const data = await res.json();
  const rows = (data.results||data.top||[]).slice(0,20);
  document.getElementById('history-content').innerHTML = `<table>
    <thead><tr><th>#</th><th>銘柄</th><th>セクター</th><th>スコア</th><th>中期リターン</th><th>陽線率</th></tr></thead>
    <tbody>${rows.map((r,i)=>`<tr>
      <td class="dim">${i+1}</td>
      <td><strong>${(r.ticker||r.code||'').replace('.T','')}</strong></td>
      <td class="dim">${(r.sector||'').slice(0,10)}</td>
      <td><span class="${scoreClass(r.score)}">${r.score.toFixed(1)}</span></td>
      <td>${fmtRet(r.return_5_25d)}</td>
      <td class="${retColor(r.green_day_ratio-0.5)}">${(r.green_day_ratio*100).toFixed(0)}%</td>
    </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── Init ──
loadRanking();
loadSignals();
loadBacktest();
loadHistory();
</script>
</body>
</html>

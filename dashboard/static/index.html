<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Alpha Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; min-height: 100vh; }

  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; color: #f0f6fc; }
  header .badge { background: #238636; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; }

  .tabs { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; display: flex; }
  .tab { padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent; color: #8b949e; font-size: 14px; transition: all 0.2s; }
  .tab:hover { color: #c9d1d9; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }

  .content { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }
  .updated { color: #8b949e; font-size: 12px; margin-bottom: 16px; }

  /* 仮説カード */
  .hypothesis-grid { display: grid; gap: 12px; }
  .hypothesis-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    padding: 20px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .hypothesis-card:hover { border-color: #58a6ff66; background: #1c2128; }
  .hypothesis-card.expanded { border-color: #58a6ff; }
  .hyp-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .hyp-theme { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .hyp-domain { font-size: 11px; color: #8b949e; background: #21262d; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .hyp-insight { color: #c9d1d9; font-size: 14px; line-height: 1.65; margin: 10px 0; }
  .hyp-meta { display: flex; gap: 16px; align-items: center; margin-top: 12px; }
  .confidence-bar { flex: 1; background: #21262d; border-radius: 4px; height: 5px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #238636, #58a6ff); }
  .confidence-label { font-size: 12px; color: #8b949e; white-space: nowrap; }
  .expand-icon { font-size: 18px; color: #8b949e; transition: transform 0.25s; }
  .hypothesis-card.expanded .expand-icon { transform: rotate(180deg); }

  /* 展開エリア */
  .hyp-detail { display: none; margin-top: 16px; border-top: 1px solid #30363d; padding-top: 16px; }
  .hypothesis-card.expanded .hyp-detail { display: block; }

  .detail-section { margin-bottom: 16px; }
  .detail-label { font-size: 11px; text-transform: uppercase; color: #58a6ff; letter-spacing: 0.8px; margin-bottom: 6px; }
  .detail-text { font-size: 14px; line-height: 1.7; color: #c9d1d9; }
  .detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 600px) { .detail-row { grid-template-columns: 1fr; } }

  /* 反論リスト */
  .counter-list { list-style: none; }
  .counter-list li { padding: 6px 0 6px 20px; font-size: 13px; color: #e3b341; border-bottom: 1px solid #21262d; position: relative; }
  .counter-list li::before { content: "⚠"; position: absolute; left: 0; }
  .counter-list li:last-child { border-bottom: none; }

  /* 先行指標 */
  .indicator-list { list-style: none; }
  .indicator-list li { padding: 5px 0 5px 18px; font-size: 13px; color: #3fb950; position: relative; }
  .indicator-list li::before { content: "→"; position: absolute; left: 0; color: #3fb950; }

  /* 銘柄カード */
  .stocks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-top: 8px; }
  .stock-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px; }
  .stock-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .stock-code { font-family: monospace; font-size: 15px; font-weight: 700; color: #58a6ff; }
  .stock-name { font-size: 13px; color: #f0f6fc; }
  .stock-reason { font-size: 12px; color: #8b949e; line-height: 1.55; margin-bottom: 6px; }
  .stock-concern { font-size: 11px; color: #e3b341; background: #2d2a1a; border-radius: 4px; padding: 4px 8px; }

  /* タイムライン */
  .timeline-badge { display: inline-block; background: #1f3a5f; border: 1px solid #388bfd44; border-radius: 6px; padding: 4px 12px; font-size: 13px; color: #79c0ff; }

  /* 銘柄テーブル */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-size: 12px; text-transform: uppercase; }
  td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #161b22; }
  .code { font-family: monospace; color: #58a6ff; font-weight: 600; }
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-fill { height: 4px; border-radius: 2px; background: #238636; }
  .positive { color: #3fb950; }
  .negative { color: #f85149; }
  .neutral { color: #8b949e; }

  /* モメンタム */
  .momentum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 768px) { .momentum-grid { grid-template-columns: 1fr; } }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
  .card h3 { font-size: 13px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; }
  .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 14px; }
  .stat:last-child { border-bottom: none; }
  .stat-label { color: #8b949e; }
  .stat-value { color: #f0f6fc; font-weight: 500; }

  .market-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .summary-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px; }
  .summary-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .summary-value { font-size: 20px; font-weight: 600; color: #f0f6fc; }

  /* スタートアップ */
  .startup-section { margin-bottom: 28px; }
  .startup-section-title { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
  .startup-theme-label { font-size: 14px; font-weight: 600; color: #58a6ff; margin-bottom: 10px; }
  .startup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .startup-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; transition: border-color 0.2s; }
  .startup-card:hover { border-color: #58a6ff44; }
  .startup-name { font-size: 16px; font-weight: 700; color: #f0f6fc; margin-bottom: 4px; }
  .startup-meta { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .startup-tag { font-size: 11px; background: #21262d; border: 1px solid #30363d; border-radius: 20px; padding: 2px 8px; color: #8b949e; }
  .startup-tag.stage { color: #3fb950; border-color: #23863644; background: #0d2a1a; }
  .startup-business { font-size: 13px; color: #8b949e; margin-bottom: 8px; line-height: 1.55; }
  .startup-why { font-size: 13px; color: #c9d1d9; line-height: 1.6; border-left: 2px solid #58a6ff44; padding-left: 10px; }
  .startup-investors { font-size: 11px; color: #8b949e; margin-top: 8px; }

  .loading { text-align: center; padding: 60px; color: #8b949e; }
  .error { background: #3d1f1f; border: 1px solid #f8514944; border-radius: 8px; padding: 16px; color: #f85149; }
</style>
</head>
<body>

<header>
  <h1>🐼 Japan Alpha Dashboard</h1>
  <span class="badge">LIVE</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('hypotheses', this)">📊 マクロ仮説</div>
  <div class="tab" onclick="showTab('candidates', this)">🎯 注目銘柄</div>
  <div class="tab" onclick="showTab('startups', this)">🚀 注目スタートアップ</div>
  <div class="tab" onclick="showTab('momentum', this)">⚡ モメンタム</div>
</div>

<div class="content">

  <!-- マクロ仮説 -->
  <div id="tab-hypotheses" class="section active">
    <div id="market-summary-area"></div>
    <div id="updated-hypotheses" class="updated"></div>
    <div id="hypothesis-list" class="hypothesis-grid">
      <div class="loading">仮説データ読み込み中...</div>
    </div>
  </div>

  <!-- 注目銘柄 -->
  <div id="tab-candidates" class="section">
    <div id="updated-candidates" class="updated"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>コード</th><th>ROE</th><th>営業利益率</th><th>売上成長率</th><th>来期予想</th><th>スコア</th>
          </tr>
        </thead>
        <tbody id="candidates-tbody">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:#8b949e">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- スタートアップ -->
  <div id="tab-startups" class="section">
    <div id="updated-startups" class="updated"></div>
    <div id="startup-list"></div>
  </div>

  <!-- モメンタム -->
  <div id="tab-momentum" class="section">
    <div id="updated-momentum" class="updated"></div>
    <div id="momentum-content" class="loading">読み込み中...</div>
  </div>

</div>

<script>
function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

function fmt(v, suffix='%', digits=1) {
  if (v == null || isNaN(v)) return '<span class="neutral">—</span>';
  const cls = v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral';
  return `<span class="${cls}">${v > 0 ? '+' : ''}${v.toFixed(digits)}${suffix}</span>`;
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

function renderHypothesis(h) {
  const stocks = (h.candidate_stocks || []).map(s => `
    <div class="stock-card">
      <div class="stock-header">
        <span class="stock-code">${s.code || ''}</span>
        <span class="stock-name">${s.name || ''}</span>
      </div>
      <div class="stock-reason">${s.reason || ''}</div>
      ${s.current_concern ? `<div class="stock-concern">⚠ ${s.current_concern}</div>` : ''}
    </div>
  `).join('');

  const counters = (h.counterarguments || []).map(c => `<li>${c}</li>`).join('');
  const indicators = (h.leading_indicators || []).map(i => `<li>${i}</li>`).join('');

  return `
    <div class="hypothesis-card" onclick="toggleCard(this)">
      <div class="hyp-header">
        <div>
          <div class="hyp-theme">${h.theme || '—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${h.domain ? `<span class="hyp-domain">${h.domain}</span>` : ''}
          <span class="expand-icon">▼</span>
        </div>
      </div>

      <div class="hyp-insight">${h.insight || h.logic || '—'}</div>

      <div class="hyp-meta">
        <div class="confidence-bar">
          <div class="confidence-fill" style="width:${((h.confidence||0)*100).toFixed(0)}%"></div>
        </div>
        <span class="confidence-label">確信度 ${((h.confidence||0)*100).toFixed(0)}%</span>
        ${h.created_at ? `<span class="confidence-label">${h.created_at}</span>` : ''}
      </div>

      <!-- 展開エリア -->
      <div class="hyp-detail">

        ${h.timeline ? `
        <div class="detail-section">
          <div class="detail-label">タイムライン</div>
          <span class="timeline-badge">📅 ${h.timeline}</span>
        </div>` : ''}

        <div class="detail-row">
          ${h.logic && h.logic !== h.insight ? `
          <div class="detail-section">
            <div class="detail-label">詳細ロジック</div>
            <div class="detail-text">${h.logic}</div>
          </div>` : '<div></div>'}

          <div>
            ${counters ? `
            <div class="detail-section">
              <div class="detail-label">主なリスク・反論</div>
              <ul class="counter-list">${counters}</ul>
            </div>` : ''}

            ${indicators ? `
            <div class="detail-section">
              <div class="detail-label">先行指標（仮説が正しければ先に動く）</div>
              <ul class="indicator-list">${indicators}</ul>
            </div>` : ''}
          </div>
        </div>

        ${stocks ? `
        <div class="detail-section">
          <div class="detail-label">候補銘柄</div>
          <div class="stocks-grid">${stocks}</div>
        </div>` : ''}

      </div>
    </div>
  `;
}

async function loadHypotheses() {
  try {
    const r = await fetch('/api/hypotheses');
    const data = await r.json();

    if (data.updated_at) {
      const domain = data.last_domain ? ` | 最新ドメイン: ${data.last_domain}` : '';
      document.getElementById('updated-hypotheses').textContent = `最終更新: ${data.updated_at}${domain}`;
    }

    if (data.market_summary) {
      const ms = data.market_summary;
      document.getElementById('market-summary-area').innerHTML = `
        <div class="market-summary">
          <div class="summary-card"><div class="summary-label">対象企業数</div><div class="summary-value">${(ms.total_companies||0).toLocaleString()}</div></div>
          <div class="summary-card"><div class="summary-label">ROE中央値</div><div class="summary-value">${(ms.median_roe||0).toFixed(1)}%</div></div>
          <div class="summary-card"><div class="summary-label">営業利益率中央値</div><div class="summary-value">${(ms.median_op_margin||0).toFixed(1)}%</div></div>
          <div class="summary-card"><div class="summary-label">ROE>15%</div><div class="summary-value">${(ms.high_roe_count||0).toLocaleString()}社</div></div>
          <div class="summary-card"><div class="summary-label">来期増収予想</div><div class="summary-value">${(ms.high_growth_count||0).toLocaleString()}社</div></div>
        </div>`;
    }

    const hyps = (data.hypotheses || []).filter(h => h.insight || h.logic);
    if (!hyps.length) {
      document.getElementById('hypothesis-list').innerHTML = '<div class="error">仮説データがありません。deep_alpha_engine.pyを実行してください。</div>';
      return;
    }
    document.getElementById('hypothesis-list').innerHTML = hyps.map(renderHypothesis).join('');
  } catch(e) {
    document.getElementById('hypothesis-list').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
  }
}

async function loadCandidates() {
  try {
    const r = await fetch('/api/candidates');
    const data = await r.json();
    if (data.updated_at) document.getElementById('updated-candidates').textContent = `最終更新: ${data.updated_at} | ${data.total||0}件`;
    const list = data.candidates || [];
    if (!list.length) {
      document.getElementById('candidates-tbody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#8b949e">データなし</td></tr>';
      return;
    }
    document.getElementById('candidates-tbody').innerHTML = list.slice(0,50).map(c => `
      <tr>
        <td><span class="code">${c.code}</span></td>
        <td>${fmt(c.roe)}</td>
        <td>${fmt(c.op_margin)}</td>
        <td>${fmt(c.sales_growth_yoy)}</td>
        <td>${fmt(c.forecast_sales_growth)}</td>
        <td><div class="score-bar"><div class="score-fill" style="width:${(c.score*80).toFixed(0)}px"></div><span>${(c.score*100).toFixed(0)}</span></div></td>
      </tr>`).join('');
  } catch(e) {
    document.getElementById('candidates-tbody').innerHTML = `<tr><td colspan="6">エラー: ${e.message}</td></tr>`;
  }
}

async function loadMomentum() {
  try {
    const r = await fetch('/api/today');
    const data = await r.json();
    const best10 = data.best10 || [];
    if (!best10.length) { document.getElementById('momentum-content').innerHTML = '<div class="error">モメンタムデータなし</div>'; return; }
    document.getElementById('updated-momentum').textContent = `シグナル: ${best10.length}件`;
    document.getElementById('momentum-content').innerHTML = `<div class="momentum-grid">${best10.slice(0,10).map(s => `
      <div class="card">
        <h3>${s.code||'—'} ${s.name||''}</h3>
        ${Object.entries(s).filter(([k])=>!['code','name'].includes(k)).slice(0,5).map(([k,v])=>
          `<div class="stat"><span class="stat-label">${k}</span><span class="stat-value">${typeof v==='number'?v.toFixed(2):v}</span></div>`
        ).join('')}
      </div>`).join('')}</div>`;
  } catch(e) {
    document.getElementById('momentum-content').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
  }
}

async function loadStartups() {
  try {
    const r = await fetch('/api/hypotheses');
    const data = await r.json();
    const hyps = (data.hypotheses || []).filter(h => h.startups && h.startups.length > 0);

    if (data.updated_at) {
      document.getElementById('updated-startups').textContent = `仮説から抽出 | 最終更新: ${data.updated_at}`;
    }

    if (!hyps.length) {
      document.getElementById('startup-list').innerHTML = '<div style="color:#8b949e;padding:40px;text-align:center">スタートアップデータがありません。deep_alpha_engine.pyを実行してください。</div>';
      return;
    }

    const html = hyps.map(h => {
      const cards = (h.startups || []).map(s => `
        <div class="startup-card">
          <div class="startup-name">${s.name}</div>
          <div class="startup-meta">
            ${s.founded ? `<span class="startup-tag">設立 ${s.founded}</span>` : ''}
            ${s.stage ? `<span class="startup-tag stage">${s.stage}</span>` : ''}
          </div>
          <div class="startup-business">${s.business || ''}</div>
          <div class="startup-why">${s.why_promising || ''}</div>
          ${s.investors ? `<div class="startup-investors">投資家: ${s.investors}</div>` : ''}
        </div>
      `).join('');

      return `
        <div class="startup-section">
          <div class="startup-theme-label">📊 ${h.theme}</div>
          <div class="startup-grid">${cards}</div>
        </div>
      `;
    }).join('');

    document.getElementById('startup-list').innerHTML = html;
  } catch(e) {
    document.getElementById('startup-list').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
  }
}

loadHypotheses();
loadCandidates();
loadStartups();
loadMomentum();
</script>
</body>
</html>

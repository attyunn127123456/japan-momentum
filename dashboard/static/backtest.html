<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バックテスト結果 | Japan Momentum</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; max-width: 1100px; margin: 0 auto; }
  a.back { color: #60a5fa; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 14px; }
  h1 { color: #60a5fa; font-size: 1.4rem; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 0.82rem; margin-bottom: 20px; }
  h2 { font-size: 0.95rem; color: #94a3b8; margin: 24px 0 12px; letter-spacing: 0.04em; text-transform: uppercase; }

  /* Cards grid */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .card { background: #161b22; border-radius: 10px; padding: 14px 16px; border: 1px solid #21262d; }
  .card .label { color: #64748b; font-size: 0.72rem; margin-bottom: 5px; letter-spacing: 0.03em; }
  .card .val { font-size: 1.35rem; font-weight: 700; }
  .pos { color: #34d399; }
  .neg { color: #f87171; }
  .neu { color: #60a5fa; }
  .warn { color: #fbbf24; }
  .gray { color: #94a3b8; }

  /* Regime panels */
  .regime-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .regime-panel { background: #161b22; border-radius: 10px; padding: 14px 16px; border: 1px solid #21262d; }
  .regime-panel .r-title { font-size: 0.88rem; font-weight: 600; margin-bottom: 10px; }
  .regime-panel .r-sharpe { font-size: 0.75rem; color: #94a3b8; margin-bottom: 8px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.78rem; }
  .bar-row .bar-label { width: 58px; color: #94a3b8; flex-shrink: 0; }
  .bar-track { flex: 1; background: #0d1117; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .bar-row .bar-val { width: 36px; text-align: right; color: #e2e8f0; flex-shrink: 0; }

  /* Signal table */
  .tbl-wrap { overflow-x: auto; background: #161b22; border-radius: 10px; border: 1px solid #21262d; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: #161b22; color: #64748b; text-align: left; padding: 9px 12px; border-bottom: 1px solid #21262d; font-weight: 500; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid #0d1117; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2128; }
  .prog-track { width: 100%; max-width: 100px; background: #0d1117; border-radius: 4px; height: 6px; display: inline-block; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 4px; background: #60a5fa; }

  /* Hypothesis list */
  .hypothesis { background: #161b22; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #21262d; }
  .hypothesis .title { font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .hypothesis .detail { color: #94a3b8; font-size: 0.79rem; }
  .badge { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 99px; }
  .badge.pending { background: #374151; color: #9ca3af; }
  .badge.running { background: #1d4ed8; color: #93c5fd; }
  .badge.done-win { background: #065f46; color: #34d399; }
  .badge.done-lose { background: #7f1d1d; color: #fca5a5; }

  /* Running indicator */
  .running-badge { display: inline-flex; align-items: center; gap: 6px; background: #1d4ed8; color: #93c5fd;
    font-size: 0.8rem; padding: 4px 12px; border-radius: 99px; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .dot { width: 8px; height: 8px; background: #60a5fa; border-radius: 50%; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Baseline / regime banner */
  .banner { background: #161b22; border-radius: 10px; padding: 16px; border: 1px solid #21262d; margin-bottom: 20px; }
  .banner .row { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
  .banner .row:last-child { margin-bottom: 0; }
  .regime-badge { font-size: 1rem; font-weight: 700; padding: 4px 14px; border-radius: 8px; }
  .regime-bull { background: #052e16; color: #34d399; }
  .regime-bear { background: #450a0a; color: #f87171; }
  .regime-highvol { background: #451a03; color: #fbbf24; }
  .regime-neutral { background: #1e293b; color: #94a3b8; }
  .meta { font-size: 0.75rem; color: #64748b; }

  @media (max-width: 600px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .regime-grid { grid-template-columns: 1fr 1fr; }
    table { font-size: 0.75rem; }
    th, td { padding: 6px 8px; }
  }
</style>
</head>
<body>
<a class="back" href="/">← スクリーナーに戻る</a>
<h1>🔬 バックテスト &amp; 改善ループ</h1>
<div class="sub" id="run-at">読み込み中...</div>

<div id="status-area"></div>

<!-- ① ベースライン＆レジーム状況 -->
<h2>📊 ベースライン＆レジーム状況</h2>
<div class="banner" id="baseline-banner">読み込み中...</div>

<!-- ② シグナルライブラリ -->
<h2>📡 シグナルライブラリ</h2>
<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th>シグナル</th>
      <th>ステータス</th>
      <th>重み</th>
      <th>Sharpe貢献</th>
    </tr></thead>
    <tbody id="signal-tbody"><tr><td colspan="4" style="color:#64748b;padding:16px">読み込み中...</td></tr></tbody>
  </table>
</div>

<!-- ③ レジーム別重みセット -->
<h2>🌐 レジーム別重みセット</h2>
<div class="regime-grid" id="regime-grid"><div style="color:#64748b;font-size:0.85rem">レジームデータなし</div></div>

<!-- ④ 改善ログ -->
<h2>🔄 改善ログ <span id="running-indicator"></span></h2>
<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th>#</th><th>仮説</th><th>結果</th><th>ΔSharpe</th><th>Sharpe</th><th>リターン</th><th>最大DD</th><th>実行日時</th>
    </tr></thead>
    <tbody id="evo-tbody"><tr><td colspan="8" style="color:#64748b;padding:16px">読み込み中...</td></tr></tbody>
  </table>
</div>

<h2>🧪 仮説キュー</h2>
<div id="hypothesis-list"></div>

<h2>🏆 グリッドサーチ TOP10</h2>
<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th>#</th><th>シャープ</th><th>リターン</th><th>α</th><th>最大DD</th>
      <th>lb</th><th>top_n</th><th>頻度</th><th>ret_w</th><th>rs_w</th><th>gr_w</th><th>sm_w</th>
    </tr></thead>
    <tbody id="opt-tbody"></tbody>
  </table>
</div>

<script>
const fmt = (v, dec=2) => v != null ? Number(v).toFixed(dec) : '-';
const fmtPct = (v) => v != null ? (v >= 0 ? '+' : '') + Number(v).toFixed(1) + '%' : '-';
const fmtSharpe = (v) => v != null ? Number(v).toFixed(2) : '-';

const STATUS_ICON = { active: '🟢', candidate: '🟡', rejected: '❌', pending: '⚪' };
const REGIME_COLORS = { Bull: 'bull', Bear: 'bear', HighVol: 'highvol', Neutral: 'neutral' };
const REGIME_EMOJI = { Bull: '🟢', Bear: '🔴', HighVol: '🟡', Neutral: '⚪' };
const BAR_COLORS = { ret_w: '#60a5fa', rs_w: '#34d399', green_w: '#4ade80', smooth_w: '#a78bfa' };

async function load() {
  const today = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});

  // --- ① ベースライン＆レジーム ---
  try {
    const [hData, regimeData] = await Promise.all([
      fetch('/api/backtest/hypothesis').then(r=>r.json()).catch(()=>null),
      fetch('/api/regime').then(r=>r.json()).catch(()=>null)
    ]);

    const bl = hData?.baseline || {};
    const running = hData?.running || false;
    document.getElementById('run-at').textContent = `最終更新: ${bl.date || '-'} | 今日: ${today}`;

    let regimeHtml = '';
    if (regimeData && !regimeData.error) {
      const cr = regimeData.current_regime || 'Neutral';
      const cls = REGIME_COLORS[cr] || 'neutral';
      const sharpeWithRegime = regimeData.sharpe_with_regime;
      regimeHtml = `
        <div class="row">
          <span class="regime-badge regime-${cls}">${REGIME_EMOJI[cr] || '⚪'} ${cr}</span>
          <span class="meta">現在のレジーム</span>
          ${sharpeWithRegime != null ? `<span class="meta">レジーム適用Sharpe: <b style="color:#34d399">${fmtSharpe(sharpeWithRegime)}</b></span>` : ''}
        </div>`;
    }

    document.getElementById('baseline-banner').innerHTML = `
      <div class="row">
        <div style="flex:1;min-width:0">
          <div style="display:flex;gap:20px;flex-wrap:wrap">
            <div><div class="meta">シャープレシオ</div><div style="font-size:1.5rem;font-weight:700;color:#60a5fa">${fmtSharpe(bl.sharpe)}</div></div>
            <div><div class="meta">トータルリターン</div><div style="font-size:1.5rem;font-weight:700" class="${(bl.total_pct||0)>=0?'pos':'neg'}">${fmtPct(bl.total_pct)}</div></div>
            <div><div class="meta">最大ドローダウン</div><div style="font-size:1.5rem;font-weight:700;color:#f87171">-${fmt(bl.max_dd_pct,1)}%</div></div>
          </div>
        </div>
        <div style="text-align:right">
          ${running ? '<span class="running-badge"><span class="spin">🔄</span> 実行中</span>' : '<span style="color:#64748b;font-size:0.8rem">⏸ 待機中</span>'}
        </div>
      </div>
      ${regimeHtml}
    `;
  } catch(e) { console.error('baseline', e); }

  // --- ② シグナルライブラリ ---
  try {
    const sig = await fetch('/api/signals').then(r=>r.json()).catch(()=>null);
    const signals = sig?.signals || [];
    if (signals.length === 0) {
      document.getElementById('signal-tbody').innerHTML = '<tr><td colspan="4" style="color:#64748b;padding:16px">シグナルデータなし</td></tr>';
    } else {
      const maxW = Math.max(...signals.map(s => s.best_weight || 0), 0.01);
      document.getElementById('signal-tbody').innerHTML = signals.map(s => {
        const icon = STATUS_ICON[s.status] || '⚪';
        const statusLabel = s.status === 'active' ? 'active' : s.status === 'candidate' ? 'candidate' : s.status === 'rejected' ? 'rejected' : s.status;
        const pct = Math.round(((s.best_weight || 0) / maxW) * 100);
        const contrib = s.sharpe_contribution != null ? `+${Number(s.sharpe_contribution).toFixed(3)}` : '-';
        return `<tr>
          <td>
            <div style="font-weight:600;font-size:0.85rem">${s.id}</div>
            <div style="color:#64748b;font-size:0.75rem">${s.desc || ''}</div>
          </td>
          <td>${icon} <span style="color:#94a3b8;font-size:0.8rem">${statusLabel}</span></td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="min-width:32px;font-size:0.85rem">${fmt(s.best_weight,2)}</span>
              <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
            </div>
          </td>
          <td style="color:${s.sharpe_contribution != null ? '#34d399' : '#64748b'}">${contrib}</td>
        </tr>`;
      }).join('');
    }
  } catch(e) { console.error('signals', e); }

  // --- ③ レジーム別重みセット ---
  try {
    const reg = await fetch('/api/regime').then(r=>r.json()).catch(()=>null);
    const regGrid = document.getElementById('regime-grid');
    if (!reg || reg.error) {
      regGrid.innerHTML = '<div style="color:#64748b;font-size:0.85rem;padding:8px">レジームデータなし（regime_weights.json未生成）</div>';
    } else {
      const regimes = ['Bull', 'Bear', 'HighVol', 'Neutral'];
      const weightKeys = ['ret_w', 'rs_w', 'green_w', 'smooth_w'];
      const weightLabels = { ret_w: 'リターン', rs_w: '相対強度', green_w: '陽線', smooth_w: '滑らか' };
      regGrid.innerHTML = regimes.map(r => {
        const weights = reg.regime_weights?.[r] || reg[r] || null;
        const cls = REGIME_COLORS[r] || 'neutral';
        const sharpe = reg.regime_sharpe?.[r] || reg[`sharpe_${r.toLowerCase()}`] || null;
        if (!weights) return `<div class="regime-panel"><div class="r-title"><span class="regime-badge regime-${cls}" style="font-size:0.8rem">${REGIME_EMOJI[r]} ${r}</span></div><div style="color:#64748b;font-size:0.8rem">データなし</div></div>`;
        const bars = weightKeys.map(k => {
          const v = weights[k] ?? 0;
          const pct = Math.round(v * 100);
          const color = BAR_COLORS[k] || '#60a5fa';
          return `<div class="bar-row">
            <span class="bar-label">${weightLabels[k]}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <span class="bar-val">${fmt(v,2)}</span>
          </div>`;
        }).join('');
        return `<div class="regime-panel">
          <div class="r-title"><span class="regime-badge regime-${cls}" style="font-size:0.82rem;padding:3px 10px">${REGIME_EMOJI[r]} ${r}</span></div>
          ${sharpe != null ? `<div class="r-sharpe">Sharpe: <b style="color:#e2e8f0">${fmtSharpe(sharpe)}</b></div>` : ''}
          ${bars}
        </div>`;
      }).join('');
    }
  } catch(e) { console.error('regime', e); }

  // --- ④ 改善ログ ---
  try {
    const [evo, hyp] = await Promise.all([
      fetch('/api/backtest/evolution').then(r=>r.json()).catch(()=>null),
      fetch('/api/backtest/hypothesis').then(r=>r.json()).catch(()=>null)
    ]);

    // Running indicator
    if (hyp?.running) {
      document.getElementById('running-indicator').innerHTML = '<span class="running-badge"><span class="spin">🔄</span> 実行中</span>';
    }

    const best10 = evo?.best10 || [];
    if (best10.length === 0) {
      document.getElementById('evo-tbody').innerHTML = '<tr><td colspan="8" style="color:#64748b;padding:16px">ログなし</td></tr>';
    } else {
      document.getElementById('evo-tbody').innerHTML = best10.map((e, i) => {
        const win = e.win;
        return `<tr>
          <td style="color:#64748b">${i+1}</td>
          <td>
            <div style="font-size:0.85rem;font-weight:600">${e.id || '-'}</div>
            <div style="color:#64748b;font-size:0.75rem">${e.desc || ''}</div>
          </td>
          <td>${win ? '<span class="badge done-win">✅ 採用</span>' : '<span class="badge done-lose">❌ 却下</span>'}</td>
          <td class="${(e.delta_sharpe||0)>=0?'pos':'neg'}">${e.delta_sharpe != null ? (e.delta_sharpe>=0?'+':'')+Number(e.delta_sharpe).toFixed(3) : '-'}</td>
          <td class="neu">${fmtSharpe(e.sharpe)}</td>
          <td class="${(e.total_return_pct||0)>=0?'pos':'neg'}">${fmtPct(e.total_return_pct)}</td>
          <td class="neg">-${fmt(e.max_dd_pct,1)}%</td>
          <td style="color:#64748b;font-size:0.75rem">${(e.at||'').slice(0,16).replace('T',' ')}</td>
        </tr>`;
      }).join('');
    }

    // 仮説キュー
    const queue = hyp?.queue || [];
    document.getElementById('hypothesis-list').innerHTML = queue.map(q => {
      const cls = q.status === 'pending' ? 'pending' : q.status === 'running' ? 'running' :
                  q.status === 'done_win' ? 'done-win' : 'done-lose';
      const label = q.status === 'pending' ? '未実施' : q.status === 'running' ? '<span class="spin">🔄</span> 実行中' :
                    q.status === 'done_win' ? `✅ +${Number(q.delta_sharpe||0).toFixed(2)} sharpe` : `❌ 改善なし`;
      return `<div class="hypothesis">
        <div class="title">${q.desc || q.id} <span class="badge ${cls}">${label}</span></div>
        ${q.result ? `<div class="detail">sharpe=${fmtSharpe(q.result.sharpe)} / total=${fmtPct(q.result.total_pct||q.result.total_return_pct)} / dd=-${fmt(q.result.max_dd_pct,1)}%</div>` : ''}
      </div>`;
    }).join('') || '<div style="color:#64748b;font-size:0.85rem;padding:8px">仮説なし</div>';
  } catch(e) { console.error('evo', e); }

  // --- グリッドサーチ TOP10 ---
  try {
    const opt = await fetch('/api/backtest/optimize').then(r=>r.json()).catch(()=>null);
    if (opt && !opt.error) {
      const sub = document.getElementById('run-at');
      sub.textContent = `グリッドサーチ実行: ${(opt.run_at||'').slice(0,16).replace('T',' ')} | テスト: ${opt.total_tested}パターン | 日経: ${fmtPct(opt.nikkei_pct)}`;
      const tbody = document.getElementById('opt-tbody');
      tbody.innerHTML = (opt.top10 || []).map((r,i) => `
        <tr>
          <td style="color:#64748b">${i+1}</td>
          <td class="neu">${fmtSharpe(r.sharpe)}</td>
          <td class="${(r.total_return_pct||0)>=0?'pos':'neg'}">${fmtPct(r.total_return_pct)}</td>
          <td class="${(r.alpha_pct||0)>=0?'pos':'neg'}">${fmtPct(r.alpha_pct)}</td>
          <td class="neg">-${fmt(r.max_dd_pct,1)}%</td>
          <td>${r.lookback}</td><td>${r.top_n}</td>
          <td>${r.rebalance === 'weekly' ? '週次' : '日次'}</td>
          <td>${fmt(r.ret_w,2)}</td><td>${fmt(r.rs_w,2)}</td><td>${fmt(r.green_w,2)}</td><td>${fmt(r.smooth_w,2)}</td>
        </tr>`).join('');
    }
  } catch(e) { console.error('opt', e); }
}
load();
</script>
</body>
</html>
